aep_version: "1.1"
dynaep_version: "0.2"
schema_revision: 1

# ===========================================================================
# dynAEP Configuration v0.2
# Governs the validation bridge between AG-UI event streams and the AEP
# frontend renderer. Every AG-UI event targeting an AEP element passes
# through this bridge before reaching the UI.
# Agents NEVER mint IDs. The bridge mints all IDs.
# ===========================================================================

# ---------------------------------------------------------------------------
# TRANSPORT
# ---------------------------------------------------------------------------

transport:
  protocol: "sse"                   # sse | websocket
  endpoint: "/api/agent"
  reconnect_interval_ms: 3000
  heartbeat_interval_ms: 15000

# ---------------------------------------------------------------------------
# AEP SOURCE FILES
# ---------------------------------------------------------------------------

aep_sources:
  scene: "./aep-scene.json"
  registry: "./aep-registry.yaml"
  theme: "./aep-theme.yaml"

# ---------------------------------------------------------------------------
# VALIDATION
# ---------------------------------------------------------------------------

validation:
  mode: "strict"                    # strict | permissive | log_only
                                    #   strict: reject invalid mutations
                                    #   permissive: apply but log warnings
                                    #   log_only: apply all, log everything
  aot_on_startup: true              # full AOT validation when bridge initialises
  jit_on_every_delta: true          # validate every STATE_DELTA and TOOL_CALL

# ---------------------------------------------------------------------------
# REGO POLICY (OPA / Open Policy Agent)
# ---------------------------------------------------------------------------

rego:
  policy_path: "./aep-policy.rego"
  evaluation: "wasm"                # wasm | cli | precompiled
                                    #   wasm: @open-policy-agent/opa-wasm (~200KB)
                                    #   cli: opa binary via subprocess (server only)
                                    #   precompiled: pre-compiled decision table (zero deps)
  bundle_mode: "unified"            # unified | separate
                                    #   unified: single WASM bundle with 3 entrypoints
                                    #   separate: three individual WASM bundles
  decision_cache_size: 5000         # LRU cache entries (0 to disable)
  cache_invalidate_on_reload: true  # safety invariant: always true
  unified_bundle_path: "./policies/aep-unified-bundle.tar.gz"
  separate_policy_paths:
    structural: "./policies/aep-policy.rego"
    temporal: "./policies/temporal-policy.rego"
    perception: "./policies/perception-policy.rego"

# ---------------------------------------------------------------------------
# CHAIN EXECUTION (OPT-004)
# ---------------------------------------------------------------------------

chain_execution:
  mode: "parallel"                  # parallel | sequential
                                    #   parallel: 5-stage concurrent execution
                                    #     Stage A: Steps 0-4 (independent reads)
                                    #     Stage B: Steps 5-9 (5←1 session, 6←2 ring)
                                    #     Stage C: Steps 10-12 (active-mode checks)
                                    #     Stage D: Step 13 (13←7 covenant)
                                    #     Stage E: Step 14 (content scanners)
                                    #   sequential: original step-by-step order (debugging)

# ---------------------------------------------------------------------------
# CONTENT SCANNERS (OPT-003)
# ---------------------------------------------------------------------------

scanners:
  engine: "unified"                 # unified | sequential
                                    #   unified: single-pass Aho-Corasick automaton
                                    #   sequential: per-scanner regex evaluation (legacy)
  # Scanner configurations are loaded programmatically via ScannerConfig[].
  # The bridge accepts scanner configs at construction time.
  # Hard-severity matches abort immediately. Soft findings are attached as metadata.

# ---------------------------------------------------------------------------
# RUNTIME REFLECTION
# ---------------------------------------------------------------------------

runtime_reflection:
  enabled: true
  method: "observer"                # observer (ResizeObserver + MutationObserver) | polling
  debounce_ms: 250                  # debounce per element to avoid flooding
  broadcast_to_agent: true          # send AEP_RUNTIME_COORDINATES events to agent
  include_invisible: false          # include elements with visible: false

# ---------------------------------------------------------------------------
# APPROVAL POLICY (Human-in-the-Loop)
# ---------------------------------------------------------------------------

approval_policy:
  structure_mutations: "auto"       # auto | require_approval
  behaviour_mutations: "auto"
  skin_mutations: "auto"
  new_element_creation: "require_approval"
  forbidden_pattern_changes: "require_approval"

# ---------------------------------------------------------------------------
# CONFLICT RESOLUTION
# ---------------------------------------------------------------------------

conflict_resolution:
  mode: "last_write_wins"           # last_write_wins | optimistic_locking
                                    #   last_write_wins: apply if valid, reject if not
                                    #   optimistic_locking: require expected_version field

# ---------------------------------------------------------------------------
# ID MINTING
# ---------------------------------------------------------------------------

id_minting:
  enabled: true                     # bridge mints all IDs, agents never generate them
  counters_persist: true            # persist ID counters across restarts

# ---------------------------------------------------------------------------
# THEMES
# ---------------------------------------------------------------------------

themes:
  available:
    - name: "dark"
      path: "./aep-theme.yaml"
    - name: "light"
      path: "./aep-theme-light.yaml"
  active: "dark"

# ---------------------------------------------------------------------------
# AG-UI FRONTEND TOOLS
# Automatically registered with the AG-UI client on bridge startup.
# aep_add_element: agent proposes topology, bridge mints ID and returns it.
# ---------------------------------------------------------------------------

tools:
  aep_add_element: true
  aep_move_element: true
  aep_query_graph: true
  aep_swap_theme: true

# ---------------------------------------------------------------------------
# LOGGING
# ---------------------------------------------------------------------------

logging:
  level: "info"                     # debug | info | warn | error
  log_rejections: true
  log_accepted_mutations: false
  log_tool_calls: true

# ---------------------------------------------------------------------------
# TA-1: TEMPORAL AUTHORITY
# ---------------------------------------------------------------------------

timekeeping:
  protocol: "ntp"                   # ntp | ptp | system
  source: "pool.ntp.org"            # NTP server or PTP grandmaster address
  sync_interval_ms: 30000           # re-sync every 30 seconds
  max_drift_ms: 50                  # reject events drifting beyond 50 ms
  max_future_ms: 500                # reject events timestamped > 500 ms in the future
  max_staleness_ms: 5000            # reject events older than 5 seconds
  bridge_is_authority: true         # bridge OVERWRITES agent timestamps
  log_drift_warnings: true          # log when drift exceeds 50% of threshold

causal_ordering:
  enabled: true
  max_reorder_buffer_size: 64       # buffer up to 64 events for reordering
  max_reorder_wait_ms: 200          # wait up to 200 ms for missing dependencies
  conflict_resolution: "last_write_wins"  # last_write_wins | optimistic_locking
  enable_vector_clocks: true        # per-agent Lamport vector clocks
  enable_element_history: true      # retain causal history per element
  history_depth: 100                # retain last 100 events per element

forecast:
  enabled: false                    # disabled by default (requires TimesFM)
  timesfm_mode: "local"             # local | remote
  timesfm_endpoint: null            # HTTP endpoint for remote mode
  context_window: 64                # feed last 64 data points
  forecast_horizon: 12              # predict 12 steps ahead
  anomaly_threshold: 3.0            # flag anomalies beyond 3.0 standard deviations
  debounce_ms: 250                  # baseline debounce (overridden by adaptive)
  adaptive_debounce: true           # learn per-element debounce intervals
  max_tracked_elements: 500         # limit memory usage for tracked elements
  anomaly_action: "warn"            # warn | require_approval | log_only

# ---------------------------------------------------------------------------
# TA-2: PERCEPTUAL TEMPORAL GOVERNANCE
# ---------------------------------------------------------------------------

perception:
  enabled: true
  enable_adaptive_profiles: true       # learn per-user temporal preferences
  profile_learning_rate: 0.15          # EMA alpha for profile updates
  profile_erosion_half_life_ms: 604800000  # 7 days in milliseconds
  min_interactions_for_profile: 5      # minimum interactions before profile adjusts
  hard_violation_action: "clamp"       # reject | clamp
  soft_violation_action: "clamp"       # clamp | warn | log_only
  governed_envelope_mode: "overwrite"  # overwrite | metadata_only
  modality_overrides: {}               # per-modality comfortable range overrides
  rego_policy_path: "./policies/perception-policy.rego"

# ---------------------------------------------------------------------------
# OPT-007: LATTICE MEMORY (Attractor Indexing)
# ---------------------------------------------------------------------------

lattice_memory:
  enabled: true
  max_attractors: 2000                   # LRU capacity for attractor index
  similarity_threshold: 0.95            # cosine similarity threshold for matching
  index_type: "lsh"                     # lsh | brute_force
  lsh_tables: 8                         # number of hash tables (L parameter)
  lsh_hash_dimension: 4                 # bits per hash (k parameter)

temporal_authority:
  audit_trail_depth: 500               # max mutation records per element
  mutation_tracking_enabled: true      # track all element mutations
  staleness_broadcast_interval_ms: 10000  # broadcast staleness checks every 10 seconds
